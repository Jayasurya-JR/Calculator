<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="calculator">
      <h1 class="text-center">calculator</h1>
      <div class="container flex flex-col">
        <div>
          <input class="input-box" type="text" />
        </div>
        <div class="row">
          <button class="button button-1">1</button>
          <button class="button button-2">2</button>
          <button class="button button-3">3</button>
          <button class="button button-add">+</button>
        </div>
        <div class="row">
          <button class="button button-4">4</button>
          <button class="button button-5">5</button>
          <button class="button button-6">6</button>
          <button class="button button-sub">-</button>
        </div>
        <div class="row">
          <button class="button button-7">7</button>
          <button class="button button-8">8</button>
          <button class="button button-9">9</button>
          <button class="button button-mul">*</button>
        </div>
        <div class="row">
          <button class="button button-zero">0</button>
          <button class="button button-dot">.</button>
          <button class="button button-eq">=</button>
          <button class="button button-div">/</button>
        </div>
      </div>
    </div>
  </body>
</html>
